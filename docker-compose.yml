
services:
  nginx:
    image: nginx:alpine
    container_name: cascata-nginx
    # Mapeamento de portas dinâmico.
    # VPS/Standalone: Usa 80:80 e 443:443 (Definido no .env)
    # EasyPanel/PaaS: Se der conflito, altere APP_HTTP_PORT no .env para 3005
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - acme_challenge:/var/www/html/.well-known/acme-challenge
      - certs:/etc/letsencrypt
      - nginx_dynamic:/etc/nginx/conf.d/dynamic
    depends_on:
      - backend_control
      - backend_data
      - frontend
    restart: always

  backend_control:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascata-backend-control
    environment:
      - SERVICE_MODE=CONTROL_PLANE
      - SYSTEM_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - PORT=3000
      - NGINX_CONTAINER_NAME=cascata-nginx
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # PERMISSÃO CRÍTICA PARA RELOAD
      - acme_challenge:/var/www/html/.well-known/acme-challenge
      - certs:/etc/letsencrypt
      - storage_data:/app/../storage
      - nginx_dynamic:/etc/nginx/conf.d/dynamic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  backend_data:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: cascata-backend-data
    environment:
      - SERVICE_MODE=DATA_PLANE
      - SYSTEM_DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@db:5432/${DB_NAME}
      - SYSTEM_JWT_SECRET=${SYSTEM_JWT_SECRET}
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - storage_data:/app/../storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cascata-frontend
    restart: always

  db:
    image: postgres:15-alpine
    container_name: cascata-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-cascata_admin}
      POSTGRES_PASSWORD: ${DB_PASS:-secure_pass}
      POSTGRES_DB: ${DB_NAME:-cascata_system}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cascata_admin} -d ${DB_NAME:-cascata_system}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cascata-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_storage:/data

volumes:
  pgdata:
  acme_challenge:
  certs:
  storage_data:
  nginx_dynamic:
  redis_storage:
